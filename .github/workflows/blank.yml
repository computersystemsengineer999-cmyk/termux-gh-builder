name: Build GH for Termux ARMv7l
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh source
        uses: actions/checkout@v4
        with:
          repository: cli/cli

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for Android ARMv7
        run: |
          # GOARM=7 ensures compatibility with armv7l processors
          # CGO_ENABLED=0 makes it a standalone binary (static)
          GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -o gh-android-armv7 ./cmd/gh
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: gh-binary
          path: gh-android-armv7
