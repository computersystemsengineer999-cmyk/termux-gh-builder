name: Build GH for Termux ARMv7l
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh source
        uses: actions/checkout@v4
        with:
          repository: cli/cli

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Using a newer stable Go version

      - name: Build for Linux ARMv7 (Termux Compatible)
        run: |
          # We change GOOS to linux to avoid the Android CGO requirement.
          # Termux handles Linux binaries perfectly.
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -o gh-linux-armv7 ./cmd/gh
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: gh-binary
          path: gh-linux-armv7
